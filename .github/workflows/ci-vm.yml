name: CI and VM Deploy

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Lint and Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CI tooling
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install black flake8 isort mypy pylint

      - name: Run lint checks
        run: |
          set -euo pipefail
          chmod +x lint.sh
          ./lint.sh --check

      - name: Run smoke checks
        run: |
          set -euo pipefail
          python -m compileall -q .

      - name: Run unit tests if present
        run: |
          set -euo pipefail
          if [ -d tests ]; then
            python -m unittest discover -s tests -v
          else
            echo "No tests directory found; skipping unit tests."
          fi

  deploy_filter:
    name: Detect Deploy-Relevant Changes
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci.result == 'success'
    outputs:
      deploy_vm: ${{ steps.filter.outputs.deploy_vm }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect deploy-relevant file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deploy_vm:
              - '**/*.py'
              - 'Dockerfile'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'vm/**'
              - 'web/**'

  deploy_vm:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    needs:
      - ci
      - deploy_filter
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci.result == 'success' && needs.deploy_filter.outputs.deploy_vm == 'true'
    environment: production

    steps:
      - name: Validate SSH configuration
        run: |
          set -euo pipefail
          if [ -z "${{ vars.VM_SSH_HOST }}" ]; then
            echo "::error::Missing repository/environment variable VM_SSH_HOST."
            exit 1
          fi
          if [ -z "${{ secrets.VM_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing repository secret VM_SSH_PRIVATE_KEY."
            exit 1
          fi
          if [ -z "${{ secrets.VM_SSH_USER }}" ]; then
            echo "::error::Missing repository secret VM_SSH_USER."
            exit 1
          fi

      - name: Run update-production.sh on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_SSH_HOST }}
          port: 2323
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /home/${{ secrets.VM_SSH_USER }}/tts-conductor
            bash vm/update-production.sh main
