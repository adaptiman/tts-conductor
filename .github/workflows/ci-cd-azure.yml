name: CI and ACR Publish

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Lint and Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CI tooling
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install black flake8 isort mypy pylint

      - name: Run lint checks
        run: |
          set -euo pipefail
          chmod +x lint.sh
          ./lint.sh --check

      - name: Run smoke checks
        run: |
          set -euo pipefail
          python -m compileall -q .

      - name: Run unit tests if present
        run: |
          set -euo pipefail
          if [ -d tests ]; then
            python -m unittest discover -s tests -v
          else
            echo "No tests directory found; skipping unit tests."
          fi

  publish_image:
    name: Build and Push ACR Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AZURE_CONTAINER_REGISTRY_NAME != '' && vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER != ''
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
      AZURE_CONTAINER_REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
      IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          required=(
            AZURE_CONTAINER_REGISTRY_NAME
            AZURE_CONTAINER_REGISTRY_LOGIN_SERVER
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing repository variable ${key}."
              exit 1
            fi
          done

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push container image
        run: |
          set -euo pipefail
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY:-tts-conductor}"
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          IMAGE_LATEST_URI="${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${IMAGE_REPOSITORY}:latest"

          az acr login --name "${AZURE_CONTAINER_REGISTRY_NAME}"
          docker build -t "${IMAGE_URI}" -t "${IMAGE_LATEST_URI}" .
          docker push "${IMAGE_URI}"
          docker push "${IMAGE_LATEST_URI}"

  deploy_vm:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    needs: publish_image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.publish_image.result == 'success'
    environment: production

    steps:
      - name: Validate SSH configuration
        run: |
          set -euo pipefail
          if [ -z "${{ vars.VM_SSH_HOST }}" ]; then
            echo "::error::Missing repository/environment variable VM_SSH_HOST."
            exit 1
          fi
          if [ -z "${{ secrets.VM_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing repository secret VM_SSH_PRIVATE_KEY."
            exit 1
          fi
          if [ -z "${{ secrets.VM_SSH_USER }}" ]; then
            echo "::error::Missing repository secret VM_SSH_USER."
            exit 1
          fi

      - name: Run update-production.sh on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_SSH_HOST }}
          port: 2323
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /home/${{ secrets.VM_SSH_USER }}/tts-conductor
            bash vm/update-production.sh main
