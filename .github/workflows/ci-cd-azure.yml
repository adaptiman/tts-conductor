name: CI and Azure Deploy

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Lint and Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CI tooling
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install black flake8 isort mypy pylint

      - name: Run lint checks
        run: |
          set -euo pipefail
          chmod +x lint.sh
          ./lint.sh --check

      - name: Run smoke checks
        run: |
          set -euo pipefail
          python -m compileall -q .

      - name: Run unit tests if present
        run: |
          set -euo pipefail
          if [ -d tests ]; then
            python -m unittest discover -s tests -v
          else
            echo "No tests directory found; skipping unit tests."
          fi

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
      AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
      AZURE_CONTAINER_REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
      IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          required=(
            AZURE_RESOURCE_GROUP
            AZURE_CONTAINER_APP_NAME
            AZURE_CONTAINER_REGISTRY_NAME
            AZURE_CONTAINER_REGISTRY_LOGIN_SERVER
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing repository variable ${key}."
              exit 1
            fi
          done

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Container Apps CLI extension
        run: |
          set -euo pipefail
          az extension add --name containerapp --upgrade

      - name: Build and push container image
        id: build
        run: |
          set -euo pipefail
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY:-tts-conductor}"
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          IMAGE_LATEST_URI="${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${IMAGE_REPOSITORY}:latest"

          az acr login --name "${AZURE_CONTAINER_REGISTRY_NAME}"
          docker build -t "${IMAGE_URI}" -t "${IMAGE_LATEST_URI}" .
          docker push "${IMAGE_URI}"
          docker push "${IMAGE_LATEST_URI}"

          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Deploy image to Container App
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${{ steps.build.outputs.image_uri }}"
