name: Deploy Launcher Function

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Azure Function Launcher
    runs-on: ubuntu-latest
    environment: production
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_JOB_NAME: ${{ vars.AZURE_CONTAINER_JOB_NAME }}
      AZURE_LAUNCHER_FUNCTIONAPP_NAME: ${{ vars.AZURE_LAUNCHER_FUNCTIONAPP_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate launcher configuration
        run: |
          set -euo pipefail
          required=(
            AZURE_RESOURCE_GROUP
            AZURE_CONTAINER_JOB_NAME
            AZURE_LAUNCHER_FUNCTIONAPP_NAME
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing repository variable ${key}."
              exit 1
            fi
          done

          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "::error::Missing repository secret AZURE_CREDENTIALS."
            exit 1
          fi

          if [ -z "${{ secrets.JOB_LAUNCHER_SHARED_SECRET }}" ]; then
            echo "::error::Missing repository secret JOB_LAUNCHER_SHARED_SECRET."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure function app settings
        run: |
          set -euo pipefail
          AZURE_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          az functionapp config appsettings set \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_LAUNCHER_FUNCTIONAPP_NAME}" \
            --settings \
              AZURE_SUBSCRIPTION_ID="${AZURE_SUBSCRIPTION_ID}" \
              AZURE_RESOURCE_GROUP="${AZURE_RESOURCE_GROUP}" \
              AZURE_CONTAINER_JOB_NAME="${AZURE_CONTAINER_JOB_NAME}" \
              JOB_LAUNCHER_SHARED_SECRET="${{ secrets.JOB_LAUNCHER_SHARED_SECRET }}"

      - name: Deploy launcher function code
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_LAUNCHER_FUNCTIONAPP_NAME }}
          package: ./launcher
          scm-do-build-during-deployment: true
          enable-oryx-build: true
