name: Deploy Launcher Function

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Azure Function Launcher
    runs-on: ubuntu-latest
    environment: production
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LAUNCHER_FUNCTIONAPP_NAME: ${{ vars.AZURE_LAUNCHER_FUNCTIONAPP_NAME }}
      VM_LAUNCHER_BASE_URL: ${{ vars.VM_LAUNCHER_BASE_URL }}
      DAILY_WEBHOOK_ROOM_NAME: ${{ vars.DAILY_WEBHOOK_ROOM_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate launcher configuration
        run: |
          set -euo pipefail
          required=(
            AZURE_RESOURCE_GROUP
            AZURE_LAUNCHER_FUNCTIONAPP_NAME
            VM_LAUNCHER_BASE_URL
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing repository variable ${key}."
              exit 1
            fi
          done

          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "::error::Missing repository secret AZURE_CREDENTIALS."
            exit 1
          fi

          if [ -z "${{ secrets.JOB_LAUNCHER_SHARED_SECRET }}" ]; then
            echo "::error::Missing repository secret JOB_LAUNCHER_SHARED_SECRET."
            exit 1
          fi

          case "${VM_LAUNCHER_BASE_URL}" in
            https://*) ;;
            *)
              echo "::error::VM_LAUNCHER_BASE_URL must start with https://"
              exit 1
              ;;
          esac

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install \
            --target=./launcher/.python_packages/lib/site-packages \
            -r ./launcher/requirements.txt

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure function app settings
        run: |
          set -euo pipefail
          # Remove blob-based run-from-package if present so the zip deploy owns the filesystem
          az functionapp config appsettings delete \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_LAUNCHER_FUNCTIONAPP_NAME}" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true
          az functionapp config appsettings set \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_LAUNCHER_FUNCTIONAPP_NAME}" \
            --settings \
              VM_LAUNCHER_BASE_URL="${VM_LAUNCHER_BASE_URL}" \
              VM_LAUNCHER_TIMEOUT_SECONDS="15" \
              JOB_LAUNCHER_SHARED_SECRET="${{ secrets.JOB_LAUNCHER_SHARED_SECRET }}" \
              DAILY_HOOK_SHARED_SECRET="${{ secrets.DAILY_HOOK_SHARED_SECRET }}" \
              DAILY_HOOK_HMAC_SECRET="${{ secrets.DAILY_HOOK_HMAC_SECRET }}" \
              DAILY_WEBHOOK_ROOM_NAME="${DAILY_WEBHOOK_ROOM_NAME:-}" \
            -o none

      - name: Package launcher
        run: |
          cd launcher
          zip -r ../launcher.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy launcher function code
        run: |
          set -euo pipefail
          az functionapp deployment source config-zip \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_LAUNCHER_FUNCTIONAPP_NAME}" \
            --src ./launcher.zip
