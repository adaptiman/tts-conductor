<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --border: #e5e7eb;
      --link: #0b57d0;
    }
    body {
      margin: 0;
      padding: 2rem 1rem 4rem;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    a {
      color: var(--link);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    pre {
      overflow-x: auto;
      background: #f3f4f6;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .back {
      margin-bottom: 1rem;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    {% unless page.dir == "/video-walkthrough/" %}
    <div class="back"><a href="/tts-conductor/">Back to docs home</a></div>
    {% endunless %}
    {{ content }}
  </main>
</body>
</html>
